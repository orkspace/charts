apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: {{ .Release.Name }}-katalog
  version: 0.1.0
  author: orkspace
  description: > 
    katalog.yaml — renders an Orkestra Katalog from Helm values.
    Orkestra's merger reads this template's output and extracts CRD definitions.
    The chart must render at least one template with kind Katalog.
  tags:
    - helm
    - composition
    - data

spec:
  crds:
    {{- range .Values.crds }}
    {{ .name }}:
      enabled: {{ .enabled | default true }}
      namespaced: {{ .namespaced | default true }}
      workers: {{ .workers | default 2 }}
      resync: {{ .resync | default "30s" }}

      apiTypes:
        group: {{ $.Values.apiGroup }}
        version: {{ $.Values.apiVersion | default "v1alpha1" }}
        kind: {{ .kind }}
        plural: {{ .plural }}
      description: {{ .description | default "" | quote }}
    {{- end }}