apiVersion: orkestra.orkspace.io/v1
kind: Katalog
metadata:
  name: {{ .Release.Name }}-katalog
  version: 0.1.0
  author: orkspace
  description: >
    katalog.yaml Helm template — renders an Orkestra Katalog from Helm values.
    Orkestra's merger reads this template's output and extracts CRD definitions.
    The chart must render at least one template with kind Katalog.
  tags:
    - helm
    - composition
    - data

spec:
  crds:
    {{- range $name, $crd := .Values.crds }}
    {{ $name }}:
      enabled: {{ $crd.enabled | default true }}
      namespaced: {{ $crd.namespaced | default true }}
      workers: {{ $crd.reconciler.workers | default 2 }}
      resync: {{ $crd.reconciler.resync | default "30s" }}

      apiTypes:
        group: {{ $.Values.apiGroup }}
        version: {{ $.Values.apiVersion | default "v1alpha1" }}
        kind: {{ $crd.kind }}
        plural: {{ $crd.plural }}
      description: {{ $crd.description | default "" | quote }}
    {{- end }}